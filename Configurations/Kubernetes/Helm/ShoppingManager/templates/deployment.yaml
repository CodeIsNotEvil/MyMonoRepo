apiVersion: apps/v1
kind: Deployment
metadata:
  name: ShoppingManager-deployment
  namespace: default
  labels:
    app: ShoppingManager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ShoppingManager
      tier: frontend
  template:
    metadata:
      labels:
        app: ShoppingManager
        tier: frontend
    spec: # Pod spec
      containers:
      - name: ShoppingManager-container
        image: devopsjourney1/ShoppingManager:latest
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: myconfigmapv1.0
        resources:
          requests:
            memory: "16Mi" 
            cpu: "50m"    # 50 milli cores (1/20 CPU)
          limits:
            memory: "128Mi" # 128 mebibytes 
            cpu: "100m"