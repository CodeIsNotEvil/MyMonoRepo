services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shoppingmanager
    volumes:
      - shoppingmanager-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migration-runner:
    build:
      context: .
      dockerfile: src/MigrationRunner/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: shoppingmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: ["dotnet", "ShoppingManager.MigrationRunner.dll"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migration-runner:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=shoppingmanager;Username=postgres;Password=postgres"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: .
      dockerfile: src/UI/Dockerfile
    depends_on:
      api:
        condition: service_started
    ports:
      - "5173:5173"

volumes:
  shoppingmanager-postgres-data:
    driver: local
